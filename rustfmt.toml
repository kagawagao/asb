# Rustfmt configuration for ASB
# See: https://rust-lang.github.io/rustfmt/

max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Auto"
use_small_heuristics = "Default"

# Imports
reorder_imports = true

# Code structure

# Formatting details
use_try_shorthand = true
use_field_init_shorthand = true
force_explicit_abi = true
